version: '3.8'

services:
  backend:
    build:
      context: ../fleet_mgmt_backend
      dockerfile: Dockerfile
    image: ghcr.io/kacpergoch/fleet-backend:local
    environment:
      # keep same env names as prod file if you use .env.prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-fleet_mgmt}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - backend_storage:/app/storage
    expose:
      - "8080"

  frontend:
    build:
      context: ../fleet_mgmt_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "/api"
    image: ghcr.io/kacpergoch/fleet-frontend:local
    ports:
      - "${FRONTEND_PORT:-80}:80"

